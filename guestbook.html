<!DOCTYPE html>
<html>
    <head>
        <title>Guestbook</title>
    </head>
    <body>
        <h3>Welcome to the Guestbook!</h3>
        <form action="index.php" method="POST" enctype="multipart/form-data">
            <label for="name">name:</label>
            <input type="text" id="name" placeholder="Enter name" minlength="2" maxlength="100" required>
            <br>

            <label for="email">email:</label>
            <input type="email" id="email" placeholder="johnhong1004@gmail.com">
            <br>

            <label for="phone">phone #:</label>
            <input type="tel" id="phone" placeholder="240-886-6208" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            <br>

            <label for="bday">birthday:</label>
            <input type="date" id="bday">
            <br>

            <label for="title">Your favorite:</label>
            <input type="radio" id="Noel" value="Noel" name="title">
            <label for="Noel">Noel</label>
            <input type="radio" id="Liam" value="Liam" name="title">
            <label for="Liam">Liam</label>
            <input type="radio" id="Bonehead" value="Bonehead" name="title">
            <label for="Bonehead">Bonehead</label>
            <br>

            <label for="payment">payment</label>
            <select id="payment">
                <option value="visa">visa</option>
                <option value="mastercard">mastercard</option>
                <option value="giftcard">giftcard</option>
            </select>
            <br>

            <label for="check">Like Oasis?</label>
            <input type="checkbox" id="check">
            <br>
            
            <label for="comment">comment:</label>
            <textarea id="comment" rows="3" cols="25"></textarea>
            <br>

            <label for="file">file:</label>
            <input type="file" id="file" accept="image/png, image/jpeg">
            <br>

            <input type="reset"><br>
            <input type="submit">
        </form>
    </body>
</html>
